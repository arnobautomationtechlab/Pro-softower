<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="utf-8">
    <!-- মোবাইল স্ক্রিনে ফিট হওয়ার জন্য এই মেটা ট্যাগটি আবশ্যক -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Efficiency Summary </title>
    <style>
      /* ফুল স্ক্রিন লেআউট নিশ্চিত করার আধুনিক নিয়ম */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; /* মূল পেজের স্ক্রোলবার লুকিয়ে রাখবে */
        display: flex;
        flex-direction: column;
      }
      
      /* আইফ্রেম যেন সব মোবাইলে স্মুথলি কাজ করে */
      iframe {
        flex-grow: 1;
        width: 100%;
        height: 100%;
        border: none;
        /* মোবাইলে আইফ্রেমের ভেতরের স্ক্রোলিং সচল রাখার জন্য */
        -webkit-overflow-scrolling: touch; 
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <!-- scrolling="no" বাদ দেওয়া হয়েছে এবং স্ক্রোলিং সিএসএস দিয়ে হ্যান্ডেল করা হয়েছে -->
    <iframe src="https://script.google.com/macros/s/AKfycbzqzexF5EnciKBfNkXN5JsgwL7Qa97Ci4h_9oVgbR5q3KvEIhkdfVL0vQWBTfavWQ0W3A/exec"></iframe>
  </body>
</html>
